name: Bug Report
description: Something isn't working right
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal code or steps to reproduce the issue.
      render: typescript
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.

  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options:
        - Anthropic (Claude)
        - OpenAI (GPT)
        - Both
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: promptcache version
      placeholder: 0.1.0

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: 22.0.0
